name: C++ CI Pipeline

on:
  push:
    branches: [main, "ci/*"]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Fetch Samples
        shell: pwsh
        run: ./scripts/fetch-samples.ps1

      - name: Install Tools (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            clang-tidy \
            lld \
            ninja-build \
            valgrind

      - name: Install Tools (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install llvm ninja -y

      - name: Configure
        run: >
          cmake -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Debug
          -DCMAKE_CXX_STANDARD=23
          -DCMAKE_CXX_STANDARD_REQUIRED=ON
          -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
          -DENABLE_BENCHMARK=OFF

      - name: Build
        run: cmake --build build --parallel

      - name: Valgrind
        if: runner.os == 'Linux'
        run: |
          valgrind \
            --leak-check=full \
            --show-leak-kinds=all \
            --error-exitcode=1 \
            ./bin/zuu_json